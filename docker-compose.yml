services:
  api:
    build: .
    container_name: phousam-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_HOST: 10.90.0.10
    depends_on:
      - db
    networks:
      phousam_net:
        ipv4_address: 10.90.0.11

  db:
    image: mysql:5.7
    container_name: phousam-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-phousam_db}
    ports:
      - "3307:3306"
    volumes:
      - phousam_db_data:/var/lib/mysql
    networks:
      phousam_net:
        ipv4_address: 10.90.0.10

networks:
  phousam_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.90.0.0/24

volumes:
  phousam_db_data:
